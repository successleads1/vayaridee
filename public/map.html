<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Live Trip Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Socket.io -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Google Maps (Directions + Geometry) -->
  <script>
    // 🔑 Put your key here (you shared this one)
    window.GMAPS_KEY = "AIzaSyAP2Q-t-kEbFRgsQowQvTJPPROt6d47Smo";
  </script>
  <script id="gloader" async defer></script>

  <style>
    :root {
      --driver: #ff2b2b;
      --rider:  #19d66b;
      --dest:   #ffffff;
      --viewer: #1b8cff;
    }
    html, body { height: 100%; margin: 0; }
    #map { position: absolute; inset: 0; }
    .topbar {
      position: absolute; z-index: 2; top: 10px; left: 10px;
      display: flex; gap: 8px; flex-wrap: wrap;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .btn {
      appearance: none; border: 1px solid #222; background: #111; color: #fff;
      padding: 8px 12px; border-radius: 8px; cursor: pointer;
    }
    .btn:hover { filter: brightness(1.2); }
    .toast {
      position: absolute; z-index: 2; right: 10px; top: 10px;
      background: rgba(0,0,0,.8); color:#fff; padding:10px 12px; border-radius:8px;
      font: 13px/1.3 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; display:none;
      max-width: 70vw;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <button class="btn" id="btnBack">🔙 Back to App</button>
    <button class="btn" id="btnCenter">🎯 Center</button>
    <button class="btn" id="btnShare">🔗 Copy Link</button>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    /* =========================
       Query + Channels
       ========================= */
    const q = new URLSearchParams(location.search);
    const rideId = q.get('rideId') || null;
    let driverChatId = q.get('driverChatId') || null;

    const rideChannel   = rideId ? `ride:${rideId}:driverLocation` : null;
    const fallbackTopic = (cid) => `driver:${cid}:location`;

    const socket = io();

    /* =========================
       Toast / UI helpers
       ========================= */
    const toastEl = document.getElementById('toast');
    function toast(msg, dur=2500) {
      toastEl.textContent = msg;
      toastEl.style.display = 'block';
      clearTimeout(toast._t);
      toast._t = setTimeout(() => (toastEl.style.display='none'), dur);
    }
    document.getElementById('btnBack').onclick = () => window.open('https://t.me/vayarider_bot', '_blank');
    document.getElementById('btnShare').onclick = async () => {
      try {
        await navigator.clipboard.writeText(location.href);
        toast('Link copied.');
      } catch { toast('Copy failed.'); }
    }

    /* =========================
       Google Maps boot
       ========================= */
    let gmap, bounds, dirService, dirRenderer;
    let driverMarker=null, pickupMarker=null, destMarker=null, youMarker=null;

    const ICONS = {
      driver: {
        path: googleLikeCirclePath(12),
        fillColor: getCSS('--driver'), fillOpacity: 1,
        strokeColor: "#ffffff", strokeWeight: 3, scale: 1, anchor: {x:12, y:12}
      },
      rider: {
        path: googleLikeCirclePath(8),
        fillColor: getCSS('--rider'), fillOpacity: 1,
        strokeColor: "#ffffff", strokeWeight: 2, scale: 1, anchor: {x:8, y:8}
      },
      dest: {
        path: googleLikeCirclePath(8),
        fillColor: getCSS('--dest'), fillOpacity: 1,
        strokeColor: "#000000", strokeWeight: 2, scale: 1, anchor: {x:8, y:8}
      },
      you: {
        path: googleLikeCirclePath(6),
        fillColor: getCSS('--viewer'), fillOpacity: 1,
        strokeColor: "#ffffff", strokeWeight: 2, scale: 1, anchor: {x:6, y:6}
      }
    };

    function getCSS(varname){ return getComputedStyle(document.documentElement).getPropertyValue(varname).trim(); }
    function googleLikeCirclePath(r){ return `M ${r},0 A ${r},${r} 0 1,0 ${-r},0 A ${r},${r} 0 1,0 ${r},0 z`; }

    function loadGoogle() {
      return new Promise((resolve, reject) => {
        if (window.google && window.google.maps) return resolve();
        const s = document.getElementById('gloader');
        s.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(window.GMAPS_KEY)}&libraries=geometry&v=quarterly`;
        s.onerror = () => reject(new Error('Google Maps failed to load'));
        s.onload  = () => {
          if (window.google && window.google.maps) resolve();
          else reject(new Error('Google Maps missing after load'));
        };
      });
    }

    function initMap() {
      gmap = new google.maps.Map(document.getElementById('map'), {
        center: { lat: -33.9249, lng: 18.4241 }, // Cape Town default
        zoom: 12,
        clickableIcons: false,
        gestureHandling: 'greedy',
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false
      });
      bounds = new google.maps.LatLngBounds();
      dirService = new google.maps.DirectionsService();
      dirRenderer = new google.maps.DirectionsRenderer({
        map: gmap, suppressMarkers: true,
        polylineOptions: { strokeColor: '#00ffff', strokeWeight: 5 }
      });

      document.getElementById('btnCenter').onclick = centerAll;
    }

    function setOrMoveMarker(ref, pos, icon) {
      if (!ref) return new google.maps.Marker({ map: gmap, position: pos, icon });
      ref.setPosition(pos);
      return ref;
    }

    function centerAll() {
      if (!bounds.isEmpty()) gmap.fitBounds(bounds, 80);
    }

    function addBound(lat, lng) {
      bounds.extend(new google.maps.LatLng(lat, lng));
    }

    let pickupCoord=null, destCoord=null, driverCoord=null;

    async function drawRoute() {
      if (!driverCoord || !pickupCoord) return;
      try {
        const req = {
          origin:  { lat: driverCoord.lat, lng: driverCoord.lng },
          destination: { lat: pickupCoord.lat, lng: pickupCoord.lng },
          travelMode: google.maps.TravelMode.DRIVING
        };
        const res = await dirService.route(req);
        dirRenderer.setDirections(res);
      } catch (e) {
        // Fallback: straight polyline
        const line = new google.maps.Polyline({
          path: [driverCoord, pickupCoord],
          strokeColor: '#ffcc00',
          strokeOpacity: 1,
          strokeWeight: 3,
          icons: [{ icon: { path: 'M 0,-1 0,1', strokeOpacity: 1, scale: 3 }, offset: '0', repeat: '12px' }]
        });
        line.setMap(gmap);
      }
    }

    function handleDriverLoc({ lat, lng }) {
      if (typeof lat !== 'number' || typeof lng !== 'number') return;
      driverCoord = { lat, lng };
      driverMarker = setOrMoveMarker(driverMarker, driverCoord, ICONS.driver);
      addBound(lat, lng);
      drawRoute();
    }

    function startViewerGeo() {
      if (!('geolocation' in navigator)) return;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          youMarker = setOrMoveMarker(youMarker, { lat: latitude, lng: longitude }, ICONS.you);
          socket.emit('viewer:location', { rideId, lat: latitude, lng: longitude, ts: Date.now() });
        },
        () => {},
        { enableHighAccuracy: true, maximumAge: 0, timeout: 12000 }
      );
      navigator.geolocation.watchPosition(
        (p) => {
          const { latitude, longitude } = p.coords;
          youMarker = setOrMoveMarker(youMarker, { lat: latitude, lng: longitude }, ICONS.you);
          socket.emit('viewer:location', { rideId, lat: latitude, lng: longitude, ts: Date.now() });
        },
        () => {},
        { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
      );
    }

    /* =========================
       Boot sequence
       ========================= */
    (async function main(){
      try {
        await loadGoogle();
        initMap();
        startViewerGeo();

        // If rideId provided, fetch static data
        if (rideId) {
          const r = await fetch(`/api/ride/${rideId}`);
          if (!r.ok) throw new Error('Ride not found');
          const data = await r.json();
          const { pickup, destination, riderName, driverChatId: dcid } = data || {};
          if (dcid) driverChatId = dcid;

          pickupCoord = { lat: pickup.lat, lng: pickup.lng };
          destCoord   = { lat: destination.lat, lng: destination.lng };

          // Markers
          pickupMarker = setOrMoveMarker(pickupMarker, pickupCoord, ICONS.rider);
          destMarker   = setOrMoveMarker(destMarker,   destCoord,   ICONS.dest);

          addBound(pickupCoord.lat, pickupCoord.lng);
          addBound(destCoord.lat, destCoord.lng);

          // Subscribe to ride-specific channel
          if (rideChannel) {
            socket.on(rideChannel, handleDriverLoc);
          }
          // And also subscribe to driver fallback if we know it
          if (driverChatId) {
            socket.on(fallbackTopic(driverChatId), handleDriverLoc);
          }

          toast('Live map ready. Tracking driver…');
          centerAll();
        }

        // Driver-only link: just subscribe to driver channel
        if (!rideId && driverChatId) {
          socket.on(fallbackTopic(driverChatId), handleDriverLoc);
          toast('Tracking driver…');
        }

      } catch (e) {
        console.error(e);
        toast('Map failed to load. Check your Google API key restrictions.');
      }
    })();
  </script>
</body>
</html>
