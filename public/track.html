<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Live Trip • VayaRide</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* Styles */
    :root{--bg:#000;--card:#0f0f0f;--text:#fff;--muted:#bbb;--border:#222;--ok:#00e676;--warn:#ffd166;--accent:#fff;--danger:#ff4d4d}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:#000;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .layout{display:grid;grid-template-rows:auto 1fr auto;height:100%}
    header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:#050505;position:sticky;top:0;z-index:3}
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:36px;height:36px;border-radius:50%;border:2px solid #fff;object-fit:cover}
    .brand h1{font-size:16px;margin:0}
    .status{font-size:14px;color:#ddd;display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid #222;background:#0b0b0b;border-radius:999px}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px #0f0}
    #map{height:100%;width:100%}
    .panel{display:flex;gap:10px;padding:10px;border-top:1px solid var(--border);background:#050505}
    .panel button{appearance:none;cursor:pointer;border-radius:10px;padding:10px 14px;font-weight:700;border:1px solid var(--border);background:#121212;color:#fff}
    .panel button.primary{border-color:#2a2a2a;background:#fff;color:#000}
    .panel button.warn{border-color:#333;background:#1a1a1a}
    .panel .right{margin-left:auto;display:flex;gap:10px}
    .lbl{background:#0b0b0b;color:#fff;border:1px solid #222;padding:4px 8px;border-radius:999px;font-size:12px;box-shadow:0 2px 10px rgba(0,0,0,.5)}
    .pulse{width:24px;height:24px;border-radius:50%;background:var(--danger);box-shadow:0 0 0 0 rgba(255,77,77,0.9);animation:pulse 1.5s infinite;border:2px solid #300}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,77,77,0.9)}70%{box-shadow:0 0 0 24px rgba(255,77,77,0)}100%{box-shadow:0 0 0 0 rgba(255,77,77,0)}}
    .legend{position:absolute;z-index:2;right:12px;top:72px;background:#0b0b0b;border:1px solid #222;border-radius:10px;padding:8px 10px;color:#ddd;font-size:12px}
    .legend .row{display:flex;align-items:center;gap:8px;margin:4px 0}
    .dot{width:10px;height:10px;border-radius:50%}
    .dot.pick{background:#41e38a;border:2px solid #093}
    .dot.drop{background:#ffb84d;border:2px solid #964}
    .dot.driver{background:#ff4d4d;border:2px solid #300}
  </style>
</head>
<body>
<div class="layout">
  <header>
    <div class="brand">
      <img src="https://res.cloudinary.com/darf17drw/image/upload/v1752064092/Untitled_design_2_wilxrl.png" alt="VayaRide" />
    </div>
    <div class="status">
      <span class="status-dot"></span>
      <span id="statusText">Loading trip…</span>
    </div>
  </header>

  <div style="position:relative">
    <div id="map"></div>
    <div class="legend">
      <div class="row"><span class="dot pick"></span> Pickup</div>
      <div class="row"><span class="dot drop"></span> Dropoff</div>
      <div class="row"><span class="dot driver"></span> Driver (live)</div>
    </div>
  </div>

  <div class="panel">
    <button id="btnStart" class="primary">Start Trip</button>
    <button id="btnPicked" class="warn">Picked Up</button>
    <div class="right">
      <button id="btnRecenter">Recenter</button>
    </div>
  </div>
</div>

<script>
(function(){
  const MAPBOX_TOKEN = 'pk.eyJ1IjoibWJ1c2lzZW5pIiwiYSI6ImNseTF3ZjZ0ajB6anUyanMyc3RmNzByem0ifQ.PCctEHWWSdY7rr0RTe28Xg';
  const qs = new URLSearchParams(location.search);
  const rideId = qs.get('rideId') || '';
  if (!rideId) { document.getElementById('statusText').textContent = 'Missing ride ID'; throw new Error('Missing rideId'); }

  const kmBetween = (a,b)=>{const t=x=>x*Math.PI/180,R=6371,dLat=t(b.lat-a.lat),dLon=t(b.lng-a.lng),s=Math.sin(dLat/2)**2+Math.cos(t(a.lat))*Math.cos(t(b.lat))*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(s));};
  const fmtKm = km => km.toFixed(2) + ' km';

  function tweenMarker(marker, from, to, ms=700){
    const start = performance.now();
    function step(ts){
      const t=Math.min(1,(ts-start)/ms);
      const lat = from.lat+(to.lat-from.lat)*t;
      const lng = from.lng+(to.lng-from.lng)*t;
      marker.setLatLng([lat,lng]);
      if(t<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  const map = L.map('map',{zoomControl:true,attributionControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20,attribution:'&copy; CARTO | &copy; OpenStreetMap'}).addTo(map);

  const pinGreen = L.icon({iconUrl:'https://unpkg.com/leaflet-color-markers@1.0.2/img/marker-icon-2x-green.png',shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',iconSize:[25,41],iconAnchor:[12,41],popupAnchor:[1,-34],shadowSize:[41,41]});
  const pinOrange= L.icon({iconUrl:'https://unpkg.com/leaflet-color-markers@1.0.2/img/marker-icon-2x-orange.png',shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',iconSize:[25,41],iconAnchor:[12,41],popupAnchor:[1,-34],shadowSize:[41,41]});
  const driverPulseIcon = L.divIcon({ className:'pulse', iconSize:[24,24], iconAnchor:[12,12] });
  const label = (text)=> L.marker([0,0],{icon:L.divIcon({className:'lbl',html:text,iconAnchor:[-6,20]})});

  const $status = document.getElementById('statusText');
  let pickup, dropoff, driverChatId=null;
  let pickupMarker, dropMarker, pickupLabel, dropLabel;
  let driverMarker, driverPos=null;
  let legDriverPickup, legTrip;
  let socket;

  fetch(`/api/ride/${encodeURIComponent(rideId)}`).then(r=>r.json()).then(async data=>{
    if(data.error) throw new Error(data.error);
    pickup=data.pickup; dropoff=data.destination; driverChatId=data.driverChatId||null;

    pickupMarker = L.marker([pickup.lat,pickup.lng],{icon:pinGreen}).addTo(map);
    dropMarker   = L.marker([dropoff.lat,dropoff.lng],{icon:pinOrange}).addTo(map);
    pickupLabel  = label('Pickup').setLatLng([pickup.lat,pickup.lng]).addTo(map);
    dropLabel    = label('Dropoff').setLatLng([dropoff.lat,dropoff.lng]).addTo(map);

    try { legTrip = await drawSnappedRoute([pickup.lng,pickup.lat],[dropoff.lng,dropoff.lat]); legTrip.addTo(map); }
    catch { legTrip = L.polyline([[pickup.lat,pickup.lng],[dropoff.lat,dropoff.lng]],{weight:4,opacity:.9}).addTo(map); }

    map.fitBounds(L.latLngBounds([[pickup.lat,pickup.lng],[dropoff.lat,dropoff.lng]]).pad(0.25));
    $status.textContent = 'Waiting for driver…';

    wireSockets();                  // live channels
    if (driverChatId) primeLast();  // initial position (one-shot)
  }).catch(e=>{$status.textContent='Failed to load trip.'; console.error(e);});

  function wireSockets(){
    socket = io({ transports:['websocket','polling'] });
    socket.on('connect', ()=>{ console.log('🔗 WS connected'); });
    socket.io.on('reconnect', ()=>{ console.log('🔁 WS reconnected'); bindChannels(); });
    socket.on('connect_error', (err)=>{ console.log('⚠️ WS connect_error', err?.message||err); });
    bindChannels();
  }

  function bindChannels(){
    if(!socket) return;
    socket.off(`ride:${rideId}:driverLocation`);
    socket.on(`ride:${rideId}:driverLocation`, (loc)=>{ console.log(`WS ride:${rideId}:driverLocation`, loc); onDriverLocation(loc); });
    if (driverChatId){
      socket.off(`driver:${driverChatId}:location`);
      socket.on(`driver:${driverChatId}:location`, (loc)=>{ console.log(`WS driver:${driverChatId}:location`, loc); onDriverLocation(loc); });
    }
  }

  async function primeLast(){
    try{
      const r = await fetch(`/api/driver-last-loc/${encodeURIComponent(driverChatId)}?rideId=${encodeURIComponent(rideId)}`);
      if (!r.ok) return;
      const loc = await r.json();
      console.log('API primeLast location', loc);
      if (typeof loc.lat==='number' && typeof loc.lng==='number') onDriverLocation(loc);
    }catch(e){ console.log('primeLast error', e); }
    setTimeout(()=>{ if(!driverMarker) primeLast(); }, 3000); // gentle retry if nothing yet
  }

  async function drawSnappedRoute(fromLngLat,toLngLat){
    const url=`https://api.mapbox.com/directions/v5/mapbox/driving/${fromLngLat.join(',')};${toLngLat.join(',')}?geometries=geojson&access_token=${MAPBOX_TOKEN}`;
    const res=await fetch(url); const data=await res.json();
    if(!data.routes||!data.routes[0]) throw new Error('No routes');
    const latlngs=data.routes[0].geometry.coordinates.map(([lng,lat])=>[lat,lng]);
    return L.polyline(latlngs,{color:'#00c2ff',weight:4,opacity:.95});
  }

  function onDriverLocation(loc){
    if(!loc||typeof loc.lat!=='number'||typeof loc.lng!=='number') return;

    if(!driverMarker){
      driverPos={lat:loc.lat,lng:loc.lng};
      driverMarker=L.marker([loc.lat,loc.lng],{icon:driverPulseIcon}).addTo(map);
      console.log('MAP first driver position', driverPos);
    }else{
      const from={...driverPos}, to={lat:loc.lat,lng:loc.lng};
      console.log('MAP move from', from, '→ to', to);
      driverPos=to; tweenMarker(driverMarker, from, to, 700);
    }
    const d=kmBetween(driverPos,pickup);
    $status.textContent = d>0.2 ? `He’s coming! Driver is ~ ${fmtKm(d)} from pickup.` : 'Driver is arriving at pickup…';
  }

  // Handle the start trip button to emit live updates
  document.getElementById('btnStart').addEventListener('click', ()=>{
    if(!driverPos){ 
      $status.textContent='Waiting for driver to start…'; 
      return; 
    }
    $status.textContent='Starting trip: heading to pickup…';

    if(legDriverPickup) legDriverPickup.setStyle({weight:5});

    // Emit live driver position updates when the trip starts
    socket.emit('start_trip', { rideId, driverId: driverChatId });
  });

  document.getElementById('btnPicked').addEventListener('click', ()=>{
    $status.textContent='Picked the rider. Heading to dropoff…';
    if(legDriverPickup) legDriverPickup.setStyle({opacity:0.25});
    if(legTrip) legTrip.setStyle({weight:5,opacity:1});
  });

  document.getElementById('btnRecenter').addEventListener('click', ()=>{
    const pts=[]; if(pickup) pts.push([pickup.lat,pickup.lng]); if(dropoff) pts.push([dropoff.lat,dropoff.lng]); if(driverPos) pts.push([driverPos.lat,driverPos.lng]);
    if(pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.3));
  });
})();
</script>
</body>
</html>
