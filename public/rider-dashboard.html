<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rider Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden; /* Prevent scrolling */
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 20px;
      height: 100%;
      overflow: hidden;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #fff;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .card {
      width: 100%;
      max-width: 600px;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      overflow-y: auto;
    }

    h2, h3 {
      text-align: center;
    }

    p, label {
      margin: 10px 0 5px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 16px;
    }

    input {
      background: #333;
      color: #fff;
    }

    button {
      background: #fff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #ddd;
    }

    .back-btn {
      margin-top: auto;
      background: transparent;
      color: #aaa;
      border: 2px solid #444;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 5px;
      display: inline-block;
      text-align: center;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      color: #fff;
      border-color: #fff;
    }

    #pinModal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #pinModal form {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      max-width: 300px;
      width: 100%;
    }

    #pinModal input {
      font-size: 24px;
      text-align: center;
      letter-spacing: 8px;
      margin-bottom: 10px;
    }

    #pinMsg {
      color: #ff4d4d;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      input, button {
        font-size: 15px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://res.cloudinary.com/darf17drw/image/upload/v1752064092/Untitled_design_2_wilxrl.png" class="logo" alt="Logo">

    <div class="card">
      <h2>👤 Rider Profile</h2>
      <div id="profile">
        <p><b>Name:</b> <span id="name">Loading...</span></p>
        <p><b>Email:</b> <span id="email">Loading...</span></p>
        <p><b>Credit:</b> R<span id="credit">0</span></p>
        <p><b>Trips Completed:</b> <span id="trips">0</span></p>
      </div>

      <hr style="margin: 20px 0; border: 0; border-top: 1px solid #333;">

      <h3>➕ Add or Update</h3>
      <form id="updateForm">
        <label for="nameInput">Name:</label>
        <input type="text" id="nameInput" required>

        <label for="emailInput">Email:</label>
        <input type="email" id="emailInput" required>

        <label for="creditInput">Credit (Rands):</label>
        <input type="number" id="creditInput" required>

        <input type="hidden" id="chatIdInput">
        <button type="submit">💾 Save</button>
      </form>

      <p id="message" style="text-align:center;"></p>
    </div>

    <a href="https://t.me/vayarider_bot" class="back-btn">⬅️ Back to Telegram</a>
  </div>

  <!-- PIN Modal -->
  <div id="pinModal">
    <form onsubmit="submitPIN(event)">
      <h2>🔐 Enter 4-digit PIN</h2>
      <input type="password" id="pinInput" maxlength="4" placeholder="****" required />
      <button type="submit">Unlock</button>
      <p id="pinMsg"></p>
    </form>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    async function submitPIN(e) {
      e.preventDefault();

      const pinInput = document.getElementById('pinInput');
      const pinMsg = document.getElementById('pinMsg');
      const PIN = (pinInput.value || '').trim();

      pinMsg.textContent = '';

      if (PIN.length !== 4) {
        pinMsg.textContent = "❌ PIN must be 4 digits.";
        return;
      }

      const url = `/api/rider-by-token/${encodeURIComponent(token)}?pin=${encodeURIComponent(PIN)}`;
      console.log('🔐 Fetching:', url);

      try {
        const res = await fetch(url);
        const text = await res.text();
        console.log('🔐 Response status:', res.status, 'Body:', text);

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error('Non-JSON response from server');
        }

        if (!res.ok) {
          throw new Error(data?.error || 'Access denied or expired.');
        }

        document.getElementById('pinModal').style.display = 'none';
        document.getElementById('chatIdInput').value = data.chatId;
        document.getElementById('name').textContent = data.name;
        document.getElementById('email').textContent = data.email;
        document.getElementById('credit').textContent = data.credit;
        document.getElementById('trips').textContent = data.trips || 0;

        document.getElementById('nameInput').value = data.name;
        document.getElementById('emailInput').value = data.email;
        document.getElementById('creditInput').value = data.credit;

      } catch (err) {
        console.error('🔐 PIN verify error:', err);
        pinMsg.textContent = err.message || "❌ Access denied or expired.";
      }
    }

    document.getElementById('updateForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = new URLSearchParams();
      payload.append('chatId', document.getElementById('chatIdInput').value);
      payload.append('name', document.getElementById('nameInput').value);
      payload.append('email', document.getElementById('emailInput').value);
      payload.append('credit', document.getElementById('creditInput').value);

      const res = await fetch('/api/update-profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: payload
      });

      const msg = document.getElementById('message');
      msg.textContent = res.ok ? '✅ Profile updated!' : '❌ Update failed.';
    });
  </script>
</body>
</html>
